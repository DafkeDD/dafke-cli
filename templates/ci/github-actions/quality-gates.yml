# GitHub Actions Quality Gates Workflow
# Generated by dafke v{{version}}
# DO NOT EDIT MANUALLY — run 'dafke update' to refresh.

name: Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{curlyOpen}} github.workflow {{curlyClose}}-${{curlyOpen}} github.ref {{curlyClose}}
  cancel-in-progress: true

env:
  COVERAGE_THRESHOLD: "{{coverageThreshold}}"
  PR_SIZE_CAP: "{{prSizeLimit}}"

jobs:
  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      {{#if (eq techStack "typescript")}}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      {{/if}}

      {{#if (eq techStack "java")}}
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - run: ./mvnw clean compile -B
      {{/if}}

      {{#if (eq techStack "dotnet")}}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
      {{/if}}

      {{#if (eq techStack "python")}}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt
      {{/if}}

  test:
    name: Test & Coverage
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      {{#if (eq techStack "typescript")}}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura-coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{curlyOpen}} secrets.CODECOV_TOKEN {{curlyClose}}
      {{/if}}

      {{#if (eq techStack "java")}}
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - run: ./mvnw verify -B

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: "**/jacoco/jacoco.xml"
          fail_ci_if_error: false
      {{/if}}

      {{#if (eq techStack "dotnet")}}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - run: dotnet test --configuration Release --collect:"XPlat Code Coverage" --logger trx

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: "**/coverage.cobertura.xml"
          fail_ci_if_error: false
      {{/if}}

      {{#if (eq techStack "python")}}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt
      - run: pytest --cov --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{curlyOpen}} secrets.CODECOV_TOKEN {{curlyClose}}
      {{/if}}

  coverage-gate:
    name: Coverage Threshold
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      {{#if (eq techStack "typescript")}}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test:coverage
      {{/if}}

      {{#if (eq techStack "python")}}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest --cov --cov-report=xml
      {{/if}}

      - name: Check coverage threshold
        run: |
          echo "Enforcing minimum coverage of ${COVERAGE_THRESHOLD}%"
          # Coverage enforcement is handled by the test framework configuration
          # This job serves as a gate that blocks merge if coverage job fails

  semgrep:
    name: "SAST — Semgrep"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep SAST
        run: |
          SEMGREP_ARGS="--config auto"
          if [ -f .semgrep.yml ]; then SEMGREP_ARGS="$SEMGREP_ARGS --config .semgrep.yml"; fi
          semgrep scan $SEMGREP_ARGS --error --json --output semgrep-results.json .

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  gitleaks:
    name: "Secrets — Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{curlyOpen}} secrets.GITHUB_TOKEN {{curlyClose}}

  pr-size:
    name: PR Size Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          ADDITIONS=$(git diff --numstat origin/${{curlyOpen}} github.base_ref {{curlyClose}}...HEAD | awk '{ add += $1; del += $2 } END { print add + del }')
          echo "PR size: ${ADDITIONS} lines changed"
          if [ "${ADDITIONS}" -gt "${PR_SIZE_CAP}" ]; then
            echo "::error::PR exceeds ${PR_SIZE_CAP} line cap (${ADDITIONS} lines). Split into smaller PRs."
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      {{#if (eq techStack "typescript")}}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run lint
      {{/if}}

      {{#if (eq techStack "java")}}
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - run: ./mvnw spotless:check -B
      {{/if}}

      {{#if (eq techStack "dotnet")}}
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - run: dotnet format --verify-no-changes
      {{/if}}

      {{#if (eq techStack "python")}}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff && ruff check
      {{/if}}

  quality-gate:
    name: Quality Gate
    needs: [build, test, coverage-gate, semgrep, gitleaks, lint, pr-size]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all gates
        run: |
          if [ "${{curlyOpen}} needs.build.result {{curlyClose}}" != "success" ] || \
             [ "${{curlyOpen}} needs.test.result {{curlyClose}}" != "success" ] || \
             [ "${{curlyOpen}} needs.semgrep.result {{curlyClose}}" != "success" ] || \
             [ "${{curlyOpen}} needs.gitleaks.result {{curlyClose}}" != "success" ] || \
             [ "${{curlyOpen}} needs.lint.result {{curlyClose}}" != "success" ]; then
            echo "One or more quality gates failed."
            exit 1
          fi
          PR_SIZE_RESULT="${{curlyOpen}} needs.pr-size.result {{curlyClose}}"
          if [ "$PR_SIZE_RESULT" = "failure" ]; then
            echo "PR size gate failed — PR exceeds line cap."
            exit 1
          fi
          echo "All quality gates passed."
