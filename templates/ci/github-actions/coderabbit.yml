# CodeRabbit AI Review Configuration
# Generated by dafke v{{version}}
# Place this file as .coderabbit.yaml in the repository root.

language: en

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - develop

  path_instructions:
    - path: "**/*.test.*"
      instructions: |
        Review test files for:
        - Adequate coverage of happy path and error scenarios
        - Proper use of test doubles (mocks, stubs, spies)
        - No test interdependencies or shared mutable state
        - Descriptive test names following "should X when Y" pattern
        - Assertion messages that explain what went wrong

    - path: "**/*.{ts,tsx,js,jsx}"
      instructions: |
        Review TypeScript/JavaScript files for:
        - No `any` types (use `unknown` with type guards)
        - No `@ts-ignore` without linked issue
        - Proper error handling (no swallowed exceptions)
        - No hardcoded secrets or credentials
        - Cross-platform compatibility (path.join, not string concatenation)

    - path: "**/*.{cs,csproj}"
      instructions: |
        Review .NET files for:
        - Nullable reference types enabled
        - Async/await used for I/O (no .Result or .Wait())
        - ILogger<T> for logging (no Console.WriteLine)
        - Proper disposal with using/IDisposable

    - path: "**/*.java"
      instructions: |
        Review Java files for:
        - No System.out.println (use logging framework)
        - Proper use of Optional<T> for nullable returns
        - No wildcard imports
        - Records for DTOs and value objects

    - path: "**/src/**"
      instructions: |
        Dafke AI governance rules:
        - Flag any hardcoded secrets or credentials
        - Flag files exceeding 400 lines (suggest splitting)
        - Flag complex methods exceeding 30 lines
        - Flag missing error handling in async operations
        - Verify healthcare data handling follows privacy requirements

  tools:
    shellcheck:
      enabled: true
    ruff:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    languagetool:
      enabled: true
      enabled_only: false
      level: default

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
  jira:
    project_keys: []
  linear:
    team_keys: []
