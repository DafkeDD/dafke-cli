# Semgrep configuration — generated by dafke v{{version}}
# Local rules loaded alongside Semgrep Registry (--config auto --config .semgrep.yml)
# Add custom rules below or use rulesets from https://semgrep.dev/explore

# Paths to exclude from scanning
options:
  exclude:
    - node_modules
    - dist
    - build
    - coverage
    - .dafke
    - "*.min.js"
    - "*.bundle.js"

# Custom rules (uncomment and customize):
# rules:
#   - id: custom-rule-example
#     pattern: eval(...)
#     message: "Avoid eval() calls"
#     languages: [javascript, typescript]
#     severity: WARNING
rules: []
